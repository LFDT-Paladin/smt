name: release

# triggered on pushing a tag
on:
  push:
    tags:
      - "v*.*.*"

env:
  SMT_VER: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26

      - name: Build and Test
        working-directory: .
        run: make

  create-release:
    name: Create GitHub Release
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Release SMT Version
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: "true"
          tag: ${{ env.SMT_VER }}
          token: ${{ secrets.PAT }}
